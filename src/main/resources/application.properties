# Server Port
server.port=8080

# Logging Level
logging.level.org.springframework.web=INFO
logging.level.com.alphabit.isbnscanner=DEBUG

# Spring Core
spring.main.allow-circular-references=true

# ---------------------------------------------------------
# DATABASE CONFIGURATION
# ---------------------------------------------------------

# Local Testing (Active)
spring.datasource.url=jdbc:sqlserver://localhost:64180;databaseName=MOORE_MARKET;integratedSecurity=true;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

# WildFly Standalone XML Connectivity (JNDI - for live server, comment out local above and uncomment these)
#spring.datasource.jndi-name=java:jboss/track_cpool
#spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ---------------------------------------------------------
# JPA / HIBERNATE
# ---------------------------------------------------------
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true

# ---------------------------------------------------------
# SECURITY / JWT
# ---------------------------------------------------------
spring.base.path=/api
spring.credential.login-path=/api/login,/api/refresh,/api/auth/login,/api/auth/selectplant
spring.credential.swagger-path=/v3/api-docs,/swagger-ui.html,/swagger-ui/**,/webjars/**
spring.credential.security-check=false

spring.jwtutil.secretKey=alphabit-isbn-scanner-secret-key
spring.jwtutil.tokenValidity=3600
spring.jwtutil.refreshTokenValidity=2592000

# DES Key for password encryption (file placed at project root)
spring.crypto.key-path=/des.key

# ---------------------------------------------------------
# DATE / TIME
# ---------------------------------------------------------
spring.date.time.zone=GMT+5:30
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss
spring.mvc.format.time=HH:mm:ss
spring.date.time.dateTimeFormatInFile=yyyy-MM-dd_hh-mm-ss
spring.date.time.sql-code=104

# AWS S3 keys removed. Credentials will be dynamically fetched from PLNTMST table using PlantMstService.
